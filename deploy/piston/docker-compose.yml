services:
  piston:
    image: ghcr.io/engineer-man/piston:latest
    container_name: piston_api
    restart: unless-stopped
    # Piston necesita aislar ejecuciones con nsjail → requiere privilegios.
    privileged: true
    ports:
      - "2000:2000"
    volumes:
      # Persiste runtimes instalados entre reinicios/redeploys.
      - piston_packages:/piston/packages
    tmpfs:
      - /tmp:exec
    environment:
      # Límites de seguridad del runner (ajusta si necesitas más).
      PISTON_COMPILE_TIMEOUT: "20000"
      PISTON_RUN_TIMEOUT: "15000"
      PISTON_OUTPUT_MAX_SIZE: "65536"
      PISTON_MAX_PROCESS_COUNT: "256"
      PISTON_MAX_OPEN_FILES: "256"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2000/api/v2/runtimes"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  piston_packages:
