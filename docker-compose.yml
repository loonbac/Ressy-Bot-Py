# ─────────────────────────────────────────────────────────────
# Ressy Bot + Piston — stack unificado (Coolify / docker compose)
#
# Uso:
#   docker compose up -d --build
#
# La primera vez, `piston-init` instala los runtimes (python,
# node, typescript, bash) vía la API HTTP de Piston y se detiene.
# Los paquetes quedan en el volumen `piston_packages`, así que en
# arranques posteriores el init los detecta y se salta.
#
# NOTA: el healthcheck de Piston usa `node` (la imagen NO trae
# wget ni curl). Usar wget deja el container "unhealthy" para
# siempre aunque la API esté viva, y tumba el deploy entero.
# ─────────────────────────────────────────────────────────────

services:
  # ── Piston: sandbox de ejecución de código ──────────────────
  piston:
    image: ghcr.io/engineer-man/piston:latest
    container_name: piston_api
    restart: unless-stopped
    # nsjail/isolate requieren privilegios para aislar procesos.
    privileged: true
    volumes:
      - piston_packages:/piston/packages
    tmpfs:
      - /tmp:exec
    environment:
      PISTON_COMPILE_TIMEOUT: "20000"
      PISTON_RUN_TIMEOUT: "15000"
      PISTON_OUTPUT_MAX_SIZE: "65536"
      PISTON_MAX_PROCESS_COUNT: "256"
      PISTON_MAX_OPEN_FILES: "256"
    healthcheck:
      # La imagen de Piston no trae wget/curl: usar node.
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:2000/api/v2/runtimes',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - ressy

  # ── Init: instala runtimes la primera vez (vía API HTTP) ─────
  # node:20 trae fetch global. Por cada lenguaje deseado que no
  # tenga runtime, instala la última versión disponible. Idempotente:
  # en arranques posteriores todo ya está y sale al toque.
  piston-init:
    image: node:20-bookworm-slim
    container_name: piston_init
    depends_on:
      piston:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - "node"
      - "-e"
      - |
        const base = "http://piston:2000/api/v2";
        const want = ["python", "node", "typescript", "bash"];
        (async () => {
          const rt = await (await fetch(base + "/runtimes")).json();
          const have = new Set(rt.map(r => r.language));
          const pkgs = await (await fetch(base + "/packages")).json();
          for (const lang of want) {
            if (have.has(lang)) { console.log("skip " + lang + " (ya instalado)"); continue; }
            const vers = pkgs.filter(p => p.language === lang).map(p => p.language_version);
            if (!vers.length) { console.log("sin paquete para " + lang); continue; }
            const latest = vers.sort((a, b) => a.localeCompare(b, undefined, { numeric: true })).pop();
            console.log("instalando " + lang + " " + latest + "...");
            const r = await fetch(base + "/packages", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ language: lang, version: latest }),
            });
            console.log("  -> " + JSON.stringify(await r.json()));
          }
          console.log("runtimes listos.");
        })().catch(e => { console.error(e); process.exit(1); });
    networks:
      - ressy

  # ── Ressy Bot: Discord + FastAPI ────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ressy_bot
    restart: unless-stopped
    # Gatea solo en piston healthy (no en init): el bot levanta
    # Discord/dashboard de inmediato; code_runner espera a que los
    # runtimes terminen de instalarse en segundo plano.
    depends_on:
      piston:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Default: servicio Piston en la misma red Docker.
      # Override desde .env si Piston corre en otro host/puerto.
      PISTON_URL: "${PISTON_URL:-http://piston:2000/api/v2}"
      # Worker-manager de videos (servicio video-worker en la misma red).
      VIDEO_MANAGER_URL: "${VIDEO_MANAGER_URL:-http://video-worker:8081}"
      # Secreto compartido bot <-> worker-manager (bearer). Definir en .env.
      VIDEO_MANAGER_SECRET: "${VIDEO_MANAGER_SECRET:-}"
    volumes:
      - bot_data:/app/data
    # Publicar al host en 65534 (Tailscale Serve frontea ese puerto).
    # NO usar 8000:8000 -> choca con el dashboard de Coolify (host:8000).
    ports:
      - "${WEB_PORT:-65534}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import os,urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:'+os.environ.get('PORT','8000')+'/healthz', timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3
    networks:
      - ressy

  # ── Video Worker-Manager: pool de selfbots que hacen Go Live ─
  # Aísla Firefox + Xvfb + ffmpeg + selfbots (riesgo ToS) en su
  # propio contenedor. El bot lo controla por HTTP (bearer). No
  # guarda tokens: el bot los registra en runtime desde el panel.
  # shm_size grande: Firefox crashea renderizando con /dev/shm chico.
  video-worker:
    build:
      context: ./video-worker
      dockerfile: Dockerfile
    container_name: ressy_video_worker
    restart: unless-stopped
    shm_size: "1gb"
    environment:
      MANAGER_PORT: "8081"
      HTTP_PORT: "8080"
      MANAGER_SECRET: "${VIDEO_MANAGER_SECRET:-}"
      # Vacío = auto (se calcula por RAM del host). Fija un número para forzarlo.
      MAX_WORKERS: "${VIDEO_MAX_WORKERS:-}"
      VIDEO_RAM_PER_WORKER_MB: "${VIDEO_RAM_PER_WORKER_MB:-1500}"
      VIDEO_RAM_RESERVE_MB: "${VIDEO_RAM_RESERVE_MB:-3000}"
      WIDTH: "${VIDEO_WIDTH:-1280}"
      HEIGHT: "${VIDEO_HEIGHT:-720}"
      FPS: "${VIDEO_FPS:-30}"
      BITRATE_KBPS: "${VIDEO_BITRATE_KBPS:-3000}"
      BITRATE_MAX_KBPS: "${VIDEO_BITRATE_MAX_KBPS:-4500}"
    healthcheck:
      # Sin auth en /health: node hace GET y valida 200.
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:8081/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - ressy

volumes:
  piston_packages:
    name: ressy_piston_packages
  bot_data:
    name: ressy_bot_data

networks:
  ressy:
    name: ressy_network
